<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conditon</title>
</head>
<body>
     
     <script>
        let num=69.5;

           switch(true){
                case(num<=100 && num >=80):
                    document.write("A+");
                    break;
                case(num<80 && num>=70):
                    document.write("A")
                    break;
                case(num<70 && num>=60):
                    document.write("A-")
                    break;
                case(num<60 && num >=50):
                    document.write("B")
                    break;
                case(num<50 && num>=40):
                    document.write("C")
                    break;
                case(num<40 && num>=33):
                    document.write("D") 
                    break;
                    
                default:
                    document.write("F")    
           }
            
        
     </script>       
        
</body>
</html>
