<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Array</title>
  </head>
  <body>
    <script>
      let category = ["Allium", "Beverage", "Dairy", "Fruits","Apple","Mango"];

       for(let i=0;i<category.length;i++){
            document.write(category[i]+"<br>")
       }
    </script>
  </body>
</html>
