<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>find array</title>
  </head>
  <body>
     
    <script>
        let array=[10,20,10,30,45,52,32,4];
        let result=array.findIndex(function(val){
            return val>30
        })
       document.write(result)
    </script>
  </body>
</html>
