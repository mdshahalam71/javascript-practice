<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do While Loop</title>
</head>
<body>
    <script>
        let i=0;
        do{
            document.write(i+"<button>submit</button> <br>");
            i=i+1;
        }while(i<3)
    </script>
</body>
</html>
