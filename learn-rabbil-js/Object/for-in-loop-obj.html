<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>for in loop object</title>
  </head>
  <body>
    <script>
      let person={
        name:"alam",
        age:23,
        city:"Rajshahi",
        height:"7 Feet"
      }

      for(let item in person){
            document.write(person[item]+"<br>")
      }
    </script>
  </body>
</html>
